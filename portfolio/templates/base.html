    <title>Mon portfolio </title>
    <style>
          /* couleur au survol */
      .navbar-nav .nav-link:hover{color: red !important;}
         /* couleur quand c'est actif au clic */
      .navbar-nav .nav-link.active{color: red !important;font-weight: bold;}
    </style>
   
  </head>

 <body data-spy="scroll" data-target=".navbar" data-offset="70" style="padding-top: 70px;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">

    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="Menu">
    <div class="navbar-nav ml-auto">
      <a class="nav-item nav-link active text-white " href="#home">Home <span class="sr-only">(current)</span></a>

    {% block content %}

    <!-- Optional JavaScript -->

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

      <script>
          const navlinks = document.querySelectorAll('.navbar-nav .nav-link');
               navlinks.forEach(link => {link.addEventListener('click', function()
               { navlinks.forEach(item => item.classList.remove('active'));
               this.classList.add('active');
               });
              });

      </script>

  </body>
